# Minimal dev config — avoids default_config which pulls in bluetooth,
# USB, and other discovery integrations that require system deps not
# present in the dev venv.
homeassistant:

frontend:
config:
history:
logbook:
recorder:
  purge_keep_days: 1
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

logger:
  default: warning
  logs:
    custom_components.zencontrol_tpi: debug
    zencontrol: debug
